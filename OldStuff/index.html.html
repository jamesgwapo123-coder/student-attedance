<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Attendance Submission</title>
    <style>
        
        
    </style>
</head>
<body>
    <div class="header">
        <button class="admin-btn" id="adminLoginBtn">Admin Login</button>
    </div>
    
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" id="closeModal">&times;</button>
            <h2>Admin Login</h2>
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="adminUsername">Username</label>
                    <input 
                        type="text" 
                        id="adminUsername" 
                        name="adminUsername" 
                        placeholder="Enter username" 
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <input 
                        type="password" 
                        id="adminPassword" 
                        name="adminPassword" 
                        placeholder="Enter password" 
                        required
                    >
                </div>
                <button type="submit">Login</button>
            </form>
            <div id="adminMessage" class="message"></div>
        </div>
    </div>
    
    <div class="container">
        <h1>Attendance Submission</h1>
        <form id="attendanceForm">
            <div class="form-group">
                <label for="schoolId">School ID</label>
                <input 
                    type="text" 
                    id="schoolId" 
                    name="schoolId" 
                    placeholder="Enter your school ID" 
                    required
                >
            </div>
            <div class="form-group">
                <label for="attendanceDate">Date</label>
                <input 
                    type="date" 
                    id="attendanceDate" 
                    name="attendanceDate" 
                    required
                >
            </div>
            <div class="form-group">
                <label for="attendanceTime">Time</label>
                <input 
                    type="time" 
                    id="attendanceTime" 
                    name="attendanceTime" 
                    required
                >
            </div>
            <button type="submit">Submit Attendance</button>
        </form>
        <div id="message" class="message"></div>
    </div>
    
    <script>
        // Admin Login Modal
        const adminModal = document.getElementById('adminModal');
        const adminLoginBtn = document.getElementById('adminLoginBtn');
        const closeModal = document.getElementById('closeModal');
        const adminLoginForm = document.getElementById('adminLoginForm');
        const adminMessage = document.getElementById('adminMessage');
        
        adminLoginBtn.addEventListener('click', function() {
            adminModal.classList.add('show');
        });
        
        closeModal.addEventListener('click', function() {
            adminModal.classList.remove('show');
            adminMessage.className = 'message';
        });
        
        window.addEventListener('click', function(e) {
            if (e.target === adminModal) {
                adminModal.classList.remove('show');
                adminMessage.className = 'message';
            }
        });
        
        adminLoginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value.trim();
            
            if (!username || !password) {
                adminMessage.textContent = 'Please fill in all fields';
                adminMessage.className = 'message error';
                return;
            }
            
            // Default admin credentials (change these in production)
            if (username === 'admin' && password === 'admin123') {
                adminMessage.textContent = 'Login successful!';
                adminMessage.className = 'message success';
                adminLoginForm.reset();
                
                setTimeout(() => {
                    adminModal.classList.remove('show');
                    adminMessage.className = 'message';
                }, 1500);
                
                console.log('Admin logged in');
                // You can redirect to admin dashboard here
            } else {
                adminMessage.textContent = 'Invalid username or password';
                adminMessage.className = 'message error';
            }
        });
        
        // Attendance Form
        document.getElementById('attendanceForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const schoolId = document.getElementById('schoolId').value.trim();
            const attendanceDate = document.getElementById('attendanceDate').value;
            const attendanceTime = document.getElementById('attendanceTime').value;
            const messageDiv = document.getElementById('message');
            
            if (!schoolId || !attendanceDate || !attendanceTime) {
                messageDiv.textContent = 'Please fill in all fields';
                messageDiv.className = 'message error';
                return;
            }
            
            console.log('Attendance submitted:', {
                schoolId: schoolId,
                date: attendanceDate,
                time: attendanceTime
            });
            
            messageDiv.textContent = 'Attendance submitted successfully!';
            messageDiv.className = 'message success';
            
            document.getElementById('attendanceForm').reset();
            
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 3000);
        });
    </script>
</body>
</html>
