app = "student-attendance-system-app"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  ConnectionStrings__DefaultConnection = "Data Source=/data/attendance.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[mounts]
  source = "sqlite_data"
  destination = "/data"
  initial_size = "1gb"
